name: Build macOS app

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build .app with PyInstaller
      run: |
        pyinstaller --windowed --name RetasPadel retas_padel.py

    - name: Archive .app
      run: |
        cd dist
        zip -r RetasPadel-mac.zip RetasPadel.app
        cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: RetasPadel-mac
        path: dist/RetasPadel-mac.zip
